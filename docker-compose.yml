version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: opulse-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: opulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d opulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: opulse-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - SECRET_KEY=supersecretkeythatisverysecureandlongerthanthirtytwobytesforhashing
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=opulse
      - POSTGRES_PORT=5432
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/opulse
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
